<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product Intelligence Brief — Gravity System</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/c9c3d0ea-48a9-4b9a-a6c0-acc7dbbbbb07.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;--paper:#f4f0e8;--warm:#faf8f3;
  --accent:#c8502a;--accent-s:#e8a080;
  --muted:#8a8070;--border:#d4cfc5;--tag:#e8e3d8;
  --strong:#2c1810;--green:#3a6b4a;--gl:#d4ead9;
  --amber:#b8861a;--al:#f0e0a8;--blue:#2a4a6b;
  --gold:#c8a84a;--red:#8b1a1a;
}
html{-webkit-font-smoothing:antialiased}
body{background:var(--paper);font-family:'DM Mono','Courier New',monospace;padding:32px 20px;min-height:100vh}

.shell{max-width:920px;margin:0 auto;background:#fff;box-shadow:0 4px 48px rgba(0,0,0,.10)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;text-align:center;padding:48px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent-s);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:Syne,sans-serif;font-weight:800;font-size:13px;letter-spacing:.06em;color:var(--ink)}
.loading-desc{font-size:9.5px;color:var(--muted);max-width:280px;line-height:1.6}

/* Brief wrap */
.brief-wrap{display:none}

/* Disclaimer */
.pd-disclaimer{padding:8px 18px;font-size:8.5px;color:var(--muted);background:var(--tag);border-bottom:1px solid var(--border);line-height:1.5}

/* Header */
.pd-brief-header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px 12px;background:var(--ink);border-bottom:2px solid var(--accent)}
.pd-brief-brand{font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:#fff;letter-spacing:-.01em;line-height:1.05;margin-bottom:3px}
.pd-brief-eye{font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.45);font-family:Syne,sans-serif;font-weight:800;text-transform:uppercase;margin-bottom:6px}
.pd-brief-concept{font-family:'DM Serif Display',serif;font-size:15px;color:rgba(255,255,255,.75);line-height:1.35;margin-top:2px}

/* Dual score */
.pd-dual-score-block{display:flex;align-items:center;gap:0;flex-shrink:0;margin-left:16px}
.pd-dual-score-item{text-align:right;padding:0 14px}
.pd-dual-score-item:first-child{padding-left:0}
.pd-dual-score-label{font-family:Syne,sans-serif;font-size:7px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px}
.pd-dual-score-num{font-family:'DM Serif Display',serif;font-size:32px;line-height:1;letter-spacing:-.02em}
.pd-dual-score-denom{font-size:11px;color:var(--muted)}
.pd-dual-score-tag{font-family:Syne,sans-serif;font-size:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.pd-dual-score-divider{width:1px;background:rgba(255,255,255,.12);align-self:stretch;margin:4px 0}

/* Score bars */
.pd-dual-bars{display:flex;flex-direction:column;gap:6px;padding:10px 18px;background:var(--ink);border-bottom:1px solid rgba(255,255,255,.08)}
.pd-dual-bar-row{display:flex;align-items:center;gap:10px}
.pd-dual-bar-lbl{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);width:72px;flex-shrink:0}
.pd-score-bar-wrap{height:4px;background:rgba(255,255,255,.12);overflow:hidden;border-radius:2px;flex:1}
.pd-score-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.pd-dual-bar-pct{font-family:Syne,sans-serif;font-size:8px;font-weight:800;width:30px;text-align:right;flex-shrink:0}

/* Combined read */
.pd-combined-read{padding:14px 18px;font-size:10.5px;line-height:1.7;color:var(--strong);background:var(--warm);border-bottom:1px solid var(--border)}
.pd-data-coverage-note{padding:6px 18px 10px;font-size:8.5px;color:var(--muted);background:var(--warm);border-bottom:1px solid var(--border)}

/* Breakdown */
.pd-breakdown{padding:14px 18px;border-bottom:1px solid var(--border)}
.pd-breakdown-head{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pd-bd-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.pd-bd-row:last-of-type{border-bottom:none}
.pd-bd-lbl{font-size:9px;color:var(--ink);font-weight:500;width:110px;flex-shrink:0}
.pd-bd-weight{font-family:Syne,sans-serif;font-size:7.5px;color:var(--muted);width:28px;flex-shrink:0;text-align:right}
.pd-bd-bar-wrap{flex:1;height:4px;background:var(--tag);border-radius:2px;overflow:hidden}
.pd-bd-bar-fill{height:100%;border-radius:2px}
.pd-bd-score{font-family:Syne,sans-serif;font-size:8.5px;font-weight:800;width:36px;text-align:right;flex-shrink:0}
.pd-ev-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:2px;font-family:Syne,sans-serif;font-size:7px;font-weight:800;flex-shrink:0;cursor:default}
.pd-rubric-note{margin-top:10px;font-size:8.5px;color:var(--muted);line-height:1.6;padding:8px 10px;background:var(--tag);border-radius:2px}
.pd-rubric-note-lbl{font-family:Syne,sans-serif;font-size:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}

/* Risk drivers */
.pd-risk-drivers{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--warm)}
.pd-risk-driver-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px dashed var(--border)}
.pd-risk-driver-row:last-of-type{border-bottom:none}
.pd-risk-driver-sev{font-family:Syne,sans-serif;font-size:8px;font-weight:800;letter-spacing:.07em;min-width:52px;flex-shrink:0;padding-top:1px}
.pd-risk-driver-name{font-size:10px;font-weight:700;color:var(--ink);flex:1}
.pd-risk-driver-note{font-size:9px;color:var(--muted);line-height:1.5;margin-top:2px}

/* Headline */
.pd-headline{padding:14px 18px;font-family:'DM Serif Display',serif;font-size:15px;color:var(--strong);line-height:1.5;border-bottom:1px solid var(--border);font-style:italic}

/* Sections */
.pd-section{border-bottom:1px solid var(--border)}
.pd-section-head{display:flex;align-items:center;gap:10px;padding:12px 18px 0;cursor:pointer;user-select:none}
.pd-section-head:hover .pd-section-title{color:var(--accent)}
.pd-section-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--border);line-height:1;width:28px;flex-shrink:0}
.pd-section-title{font-family:Syne,sans-serif;font-weight:800;font-size:11px;letter-spacing:.05em;color:var(--ink);flex:1}
.pd-section-toggle{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.pd-section.open .pd-section-toggle{transform:rotate(180deg)}
.pd-section-body{display:none;padding:8px 18px 14px}
.pd-section.open .pd-section-body{display:block}

.pd-conf-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pd-conf-chip{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.1em}
.pd-obs-block{margin-bottom:8px;border:1px solid var(--border);border-radius:2px;overflow:hidden}
.pd-obs-row{display:flex;align-items:flex-start;gap:0;border-bottom:1px solid var(--border)}
.pd-obs-row:last-child{border-bottom:none}
.pd-obs-lbl{font-family:Syne,sans-serif;font-size:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 10px;background:var(--tag);width:90px;flex-shrink:0;line-height:1.4}
.pd-obs-val{font-size:9.5px;color:var(--ink);line-height:1.6;padding:8px 10px;flex:1}
.pd-verdict{font-size:10.5px;color:var(--ink);line-height:1.7;margin-bottom:8px}
.pd-risks-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.pd-risk-item{font-size:9px;color:var(--accent);display:flex;align-items:flex-start;gap:6px;line-height:1.5}
.pd-risk-item::before{content:'▲';font-size:7px;flex-shrink:0;margin-top:2px}

/* Score tag chips */
.tag{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.08em;padding:3px 8px;border-radius:2px}
.tg{background:var(--gl);color:var(--green)}
.tw{background:var(--al);color:var(--amber)}
.tr{background:#f0d4d4;color:var(--red)}

/* Next move */
.pd-next-move{padding:18px;margin:0;border-bottom:1px solid var(--border);background:var(--warm)}
.pd-next-move-head{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.pd-next-move-rec{font-family:'DM Serif Display',serif;font-size:17px;color:var(--strong);line-height:1.4;margin-bottom:10px}
.pd-next-move-rat{font-size:10.5px;color:var(--ink);line-height:1.65;margin-bottom:12px}
.pd-actions-label{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:7px}
.pd-actions-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.pd-actions-list li{font-size:9.5px;color:var(--ink);line-height:1.5;display:flex;align-items:flex-start;gap:7px}
.pd-actions-list li::before{content:'→';color:var(--accent-s);flex-shrink:0}

/* OS Data sections — PMF / Unit Economics / Capital */
.pd-os-section{padding:14px 18px;border-bottom:1px solid var(--border)}
.pd-os-section-head{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pd-os-section-head span.pd-os-badge{font-size:6.5px;padding:2px 6px;border-radius:1px;background:var(--ink);color:rgba(255,255,255,.6);letter-spacing:.1em}
.pd-os-cat-note{font-size:9px;color:var(--muted);line-height:1.6;padding:8px 10px;background:var(--tag);border-radius:2px;margin-bottom:10px}
.pd-pmf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:8px}
.pd-pmf-card{border:1px solid var(--border);border-radius:2px;padding:8px 10px;background:#fff}
.pd-pmf-lbl{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.pd-pmf-thresholds{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.pd-pmf-good{font-size:8.5px;color:var(--green)}
.pd-pmf-warn{font-size:8.5px;color:var(--amber)}
.pd-pmf-risk{font-size:8.5px;color:var(--accent)}
.pd-pmf-assessment{font-size:8.5px;color:var(--ink);line-height:1.5;padding-top:5px;border-top:1px solid var(--border);margin-top:4px}
.pd-pmf-readiness{font-size:9.5px;color:var(--ink);line-height:1.65;padding:8px 10px;background:var(--warm);border-radius:2px;margin-top:8px}
.pd-wf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.pd-wf-cell{background:var(--tag);border-radius:2px;padding:8px 10px}
.pd-wf-lbl{font-family:Syne,sans-serif;font-size:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.pd-wf-val{font-size:10px;font-weight:600;color:var(--ink)}
.pd-wf-verdict{font-size:9.5px;color:var(--ink);line-height:1.65;padding:8px 10px;background:var(--warm);border-radius:2px;margin-top:8px}
.pd-cap-model-name{font-family:'DM Serif Display',serif;font-size:14px;color:var(--strong);margin-bottom:6px}
.pd-cap-phases{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.pd-cap-phase{padding:8px 10px;border-left:3px solid var(--border);background:#fff}
.pd-cap-phase-head{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.pd-cap-phase-name{font-family:Syne,sans-serif;font-size:8.5px;font-weight:800;letter-spacing:.05em;color:var(--ink);flex:1}
.pd-cap-phase-time{font-size:8px;color:var(--muted)}
.pd-cap-phase-cap{font-size:9.5px;color:var(--green);font-weight:600;margin-bottom:2px}
.pd-cap-phase-drivers{font-size:8.5px;color:var(--muted);line-height:1.4}
.pd-cap-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px;background:var(--tag);border-radius:2px;margin-top:6px}
.pd-cap-meta-lbl{font-family:Syne,sans-serif;font-size:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.pd-cap-meta-val{font-size:9px;color:var(--ink);line-height:1.4}
.pd-cap-kill{font-size:8.5px;color:var(--accent);padding:7px 10px;background:#fff8f5;border:1px solid #e8cfc0;border-radius:2px;margin-top:6px;line-height:1.5}

/* Footer */
.pd-footer{padding:12px 18px;background:var(--tag);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pd-footer-brand{font-family:Syne,sans-serif;font-size:7.5px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.pd-footer-actions{display:flex;gap:8px}
.pd-footer-btn{font-family:Syne,sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.06em;padding:6px 14px;border:1px solid var(--border);border-radius:2px;background:var(--warm);color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s}
.pd-footer-btn:hover{border-color:var(--ink);color:var(--ink)}
.pd-footer-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.pd-footer-btn.primary:hover{background:#9D4E27}

/* Verdict badge */
.pd-verdict-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:2px;font-family:Syne,sans-serif;font-size:9px;font-weight:800;letter-spacing:.1em}

@media print{
  body{background:#fff;padding:0}
  .shell{box-shadow:none;max-width:100%}
  .pd-footer-actions{display:none}
  .pd-section-body{display:block!important}
  .pd-section.open .pd-section-toggle,.pd-section-toggle{display:none}
}
@media(max-width:600px){
  .pd-dual-score-block{display:none}
  .pd-brief-brand{font-size:22px}
  .pd-bd-lbl{width:80px}
}
</style>
</head>
<body>

<div class="shell">

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-title">Loading brief…</div>
    <div class="loading-desc">Fetching your Product Intelligence Brief</div>
  </div>

  <!-- Brief -->
  <div class="brief-wrap" id="brief-wrap"></div>

</div>

<script>
const API = 'https://github-repo-production-fc09.up.railway.app';

const params  = new URLSearchParams(window.location.search);
const briefId = params.get('id');

const VERDICT_COLORS = {
  'BUILD':          'var(--green)',
  'REFINE':         'var(--amber)',
  'REPOSITION':     'var(--blue)',
  'VALIDATE FIRST': '#6B3A2A',
  'PAUSE':          'var(--accent)'
};
const VERDICT_BG = {
  'BUILD':          'var(--gl)',
  'REFINE':         'var(--al)',
  'REPOSITION':     '#d4e0ea',
  'VALIDATE FIRST': '#f0ddd4',
  'PAUSE':          '#f0d4d4'
};
const SCORE_COLOR = s => s >= 7 ? 'var(--green)' : s >= 5 ? 'var(--amber)' : 'var(--accent)';
const SEV_COLOR   = s => s === 'HIGH' ? 'var(--accent)' : s === 'MEDIUM' ? 'var(--amber)' : 'var(--green)';
const EV_STYLE    = g => g === 'A'
  ? 'background:rgba(26,95,160,.12);color:#1a5fa0'
  : g === 'B'
  ? 'background:rgba(128,96,0,.12);color:#7a5c00'
  : 'background:rgba(100,100,100,.1);color:#666';

async function loadBrief() {
  if (!briefId) {
    document.getElementById('loading').innerHTML = '<p style="font-size:12px;color:var(--accent)">No brief ID found. <a href="/" style="color:var(--accent)">Return to home →</a></p>';
    return;
  }
  try {
    const res  = await fetch(`${API}/api/brief/${briefId}`);
    const data = await res.json();
    if (!res.ok || !data.brief) {
      document.getElementById('loading').innerHTML = '<p style="font-size:12px;color:var(--accent)">Brief not found. <a href="mailto:hello@aterrastudio.co" style="color:var(--accent)">Contact us →</a></p>';
      return;
    }
    renderBrief(data);
  } catch(err) {
    document.getElementById('loading').innerHTML = '<p style="font-size:12px;color:var(--accent)">Could not load brief. Please try refreshing.</p>';
  }
}

function renderBrief(data) {
  const b    = data.brief;
  const meta = b.meta || {};
  const verdict = meta.verdict || '—';
  const oScore  = meta.opportunityScore || 0;
  const rScore  = meta.executionRisk || 0;
  const oColor  = oScore >= 70 ? 'var(--green)' : oScore >= 50 ? 'var(--amber)' : 'var(--accent)';
  const rColor  = rScore >= 60 ? 'var(--accent)' : rScore >= 40 ? 'var(--amber)' : 'var(--green)';
  const oLabel  = oScore >= 70 ? 'STRONG' : oScore >= 50 ? 'MODERATE' : 'WEAK';
  const rLabel  = rScore >= 60 ? 'HIGH' : rScore >= 40 ? 'MODERATE' : 'LOW';

  // Opportunity breakdown rows
  const bdRows = (b.opportunityBreakdown || []).map(r => {
    const pct = Math.round((r.score / r.weight) * 100);
    const col = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--accent)';
    return `<div class="pd-bd-row" title="${r.note || ''}">
      <div class="pd-bd-lbl">${r.label}</div>
      <div class="pd-bd-weight">${r.weight}%</div>
      <div class="pd-bd-bar-wrap"><div class="pd-bd-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="pd-bd-score" style="color:${col}">${r.score}/${r.weight}</div>
      <span class="pd-ev-badge" style="${EV_STYLE(r.evidenceGrade)}" title="${r.note || ''}">${r.evidenceGrade}</span>
    </div>`;
  }).join('');

  // Execution risk drivers
  const riskRows = (b.executionRiskDrivers || []).map(r => `
    <div class="pd-risk-driver-row">
      <div>
        <span class="pd-risk-driver-sev" style="color:${SEV_COLOR(r.severity)}">${r.severity}</span>
      </div>
      <div>
        <div class="pd-risk-driver-name">${r.name}</div>
        <div class="pd-risk-driver-note">${r.detail}</div>
      </div>
    </div>`).join('');

  // Dimensions
  const dimSections = (b.dimensions || []).map((d, i) => {
    const scoreTag = d.scoreLabel === 'STRONG' ? 'tg' : d.scoreLabel === 'WATCH' ? 'tw' : 'tr';
    const confColor = d.confidence === 'HIGH' ? 'var(--green)' : d.confidence === 'MEDIUM' ? 'var(--amber)' : 'var(--accent)';
    const risksHtml = (d.keyRisks || []).map(r => `<div class="pd-risk-item">${r}</div>`).join('');
    return `
    <div class="pd-section" id="dim-${i}">
      <div class="pd-section-head" onclick="toggleSection('dim-${i}')">
        <div class="pd-section-num">${String(i+1).padStart(2,'0')}</div>
        <div class="pd-section-title">${d.name}</div>
        <span class="tag ${scoreTag}" style="font-size:8px;">▲ ${d.scoreLabel || ''}</span>
        <span class="pd-ev-badge" style="${EV_STYLE(d.evidenceGrade)};margin-left:4px" title="Evidence grade ${d.evidenceGrade}">${d.evidenceGrade}</span>
        <span class="pd-section-toggle">▾</span>
      </div>
      <div class="pd-section-body">
        <div class="pd-conf-row">
          <span class="pd-conf-chip" style="color:${confColor}">● ${d.confidence} CONFIDENCE</span>
          <span class="pd-ev-badge" style="${EV_STYLE(d.evidenceGrade)}">${d.evidenceGrade}</span>
        </div>
        <div class="pd-obs-block">
          <div class="pd-obs-row"><span class="pd-obs-lbl">OBSERVED</span><span class="pd-obs-val">${d.observed || ''}</span></div>
          <div class="pd-obs-row"><span class="pd-obs-lbl">INTERPRETED AS</span><span class="pd-obs-val">${d.interpretedAs || ''}</span></div>
          ${d.formatRecommendation ? `<div class="pd-obs-row"><span class="pd-obs-lbl">FORMAT REC.</span><span class="pd-obs-val">${d.formatRecommendation}</span></div>` : ''}
          ${d.recommendation ? `<div class="pd-obs-row" style="border-top:1px solid var(--border)"><span class="pd-obs-lbl" style="color:var(--accent)">RECOMMENDATION</span><span class="pd-obs-val" style="font-weight:500;color:var(--strong)">${d.recommendation}</span></div>` : ''}
        </div>
        <div class="pd-verdict">${d.verdict || ''}</div>
        ${risksHtml ? `<div class="pd-risks-list">${risksHtml}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // PMF Analysis section
  const pmf = b.pmfAnalysis || {};
  const pmfThresholdCards = (pmf.thresholds || []).map(t => {
    return `<div class="pd-pmf-card">
      <div class="pd-pmf-lbl">${t.signal}</div>
      <div class="pd-pmf-thresholds">
        <div class="pd-pmf-good">✓ ${t.target}</div>
        <div class="pd-pmf-warn">△ ${t.warn}</div>
        <div class="pd-pmf-risk">✕ ${t.risk}</div>
      </div>
      ${t.assessment ? `<div class="pd-pmf-assessment">${t.assessment}</div>` : ''}
    </div>`;
  }).join('');

  // Unit Economics section
  const ue = b.unitEconomics || {};
  const cb = ue.categoryBenchmarks || {};
  const wfCells = [
    { l: 'Retail Price',         v: cb.retailPrice },
    { l: 'COGS',                 v: cb.cogs },
    { l: 'Gross Margin',         v: cb.grossMargin },
    { l: 'Trade Spend',          v: cb.tradeSpend },
    { l: 'Contribution Margin',  v: cb.contributionMargin },
  ].filter(c => c.v).map(c => `<div class="pd-wf-cell"><div class="pd-wf-lbl">${c.l}</div><div class="pd-wf-val">${c.v}</div></div>`).join('');

  // Capital Roadmap section
  const cr = b.capitalRoadmap || {};
  const phaseHtml = (cr.phaseEstimates || []).map(p => {
    const riskColor = p.risk === 'very high' || p.risk === 'critical' ? 'var(--accent)' : p.risk === 'high' ? 'var(--amber)' : p.risk === 'medium' || p.risk === 'medium-high' ? 'var(--gold)' : 'var(--green)';
    return `<div class="pd-cap-phase" style="border-left-color:${riskColor}">
      <div class="pd-cap-phase-head">
        <span class="pd-cap-phase-name">${p.phase}</span>
        <span class="pd-cap-phase-time">${p.timeline || ''}</span>
        <span style="font-family:Syne,sans-serif;font-size:7px;font-weight:800;color:${riskColor}">${(p.risk||'').toUpperCase()}</span>
      </div>
      <div class="pd-cap-phase-cap">${p.capital || ''}</div>
      <div class="pd-cap-phase-drivers">${p.primaryDrivers || ''}</div>
    </div>`;
  }).join('');

  // Next move
  const nm = b.nextMove || {};
  const actionsHtml = (nm.immediateActions || []).map(a => `<li>${a}</li>`).join('');

  const html = `
    <div class="pd-disclaimer">${b.disclaimer || ''}</div>

    <div class="pd-brief-header">
      <div>
        <div class="pd-brief-brand">${meta.conceptName || '—'}</div>
        <div class="pd-brief-eye">Product Intelligence Brief · ${meta.category || data.tier === 'reviewed' ? 'Aterra Reviewed Brief' : 'Instant Gravity Scan'}</div>
        <div class="pd-brief-concept">${b.verdictSummary ? b.verdictSummary.slice(0,120) + '…' : ''}</div>
      </div>
      <div class="pd-dual-score-block">
        <div class="pd-dual-score-item">
          <div class="pd-dual-score-label">Opportunity</div>
          <div class="pd-dual-score-num" style="color:${oColor}">${oScore}<span class="pd-dual-score-denom">/100</span></div>
          <div class="pd-dual-score-tag" style="color:${oColor}">${oLabel}</div>
        </div>
        <div class="pd-dual-score-divider"></div>
        <div class="pd-dual-score-item">
          <div class="pd-dual-score-label">Exec. Risk</div>
          <div class="pd-dual-score-num" style="color:${rColor}">${rScore}<span class="pd-dual-score-denom">/100</span></div>
          <div class="pd-dual-score-tag" style="color:${rColor}">${rLabel}</div>
        </div>
      </div>
    </div>

    <div class="pd-dual-bars">
      <div class="pd-dual-bar-row">
        <div class="pd-dual-bar-lbl">Opportunity</div>
        <div class="pd-score-bar-wrap"><div class="pd-score-bar-fill" style="width:${oScore}%;background:${oColor}"></div></div>
        <div class="pd-dual-bar-pct" style="color:${oColor}">${oScore}%</div>
      </div>
      <div class="pd-dual-bar-row">
        <div class="pd-dual-bar-lbl">Exec. Risk</div>
        <div class="pd-score-bar-wrap"><div class="pd-score-bar-fill" style="width:${rScore}%;background:${rColor}"></div></div>
        <div class="pd-dual-bar-pct" style="color:${rColor}">${rScore}%</div>
      </div>
    </div>

    <div class="pd-combined-read">${b.combinedRead || ''}</div>

    ${b.opportunityBreakdown?.length ? `
    <div class="pd-breakdown">
      <div class="pd-breakdown-head"><span>OPPORTUNITY SCORE BREAKDOWN</span><span style="font-weight:400;opacity:.6;font-size:8px">hover rows for notes</span></div>
      ${bdRows}
      ${b.opportunityRubric ? `<div class="pd-rubric-note"><span class="pd-rubric-note-lbl">WHAT WOULD LOWER THIS SCORE</span>${b.opportunityRubric}</div>` : ''}
    </div>` : ''}

    ${b.executionRiskDrivers?.length ? `
    <div class="pd-risk-drivers">
      <div class="pd-breakdown-head">EXECUTION RISK DRIVERS</div>
      ${riskRows}
      ${b.riskRubric ? `<div class="pd-rubric-note"><span class="pd-rubric-note-lbl">HOW TO LOWER RISK</span>${b.riskRubric}</div>` : ''}
    </div>` : ''}

    ${b.headline ? `<div class="pd-headline">${b.headline}</div>` : ''}

    ${dimSections}

    ${pmfThresholdCards ? `
    <div class="pd-os-section">
      <div class="pd-os-section-head">PMF THRESHOLDS <span class="pd-os-badge">ATERRA OS</span></div>
      ${pmf.categoryNote ? `<div class="pd-os-cat-note">${pmf.categoryNote}</div>` : ''}
      <div class="pd-pmf-grid">${pmfThresholdCards}</div>
      ${pmf.overallPMFReadiness ? `<div class="pd-pmf-readiness">${pmf.overallPMFReadiness}</div>` : ''}
    </div>` : ''}

    ${wfCells ? `
    <div class="pd-os-section" style="background:var(--warm)">
      <div class="pd-os-section-head">UNIT ECONOMICS <span class="pd-os-badge">ATERRA OS</span></div>
      <div class="pd-wf-grid">${wfCells}</div>
      ${ue.conceptAssessment ? `<div class="pd-wf-verdict">${ue.conceptAssessment}</div>` : ''}
      ${ue.marginArchitectureVerdict ? `<div class="pd-rubric-note"><span class="pd-rubric-note-lbl">MARGIN VERDICT</span>${ue.marginArchitectureVerdict}</div>` : ''}
      ${ue.killCondition ? `<div class="pd-cap-kill" style="margin-top:8px">⚠ Kill condition: ${ue.killCondition}</div>` : ''}
    </div>` : ''}

    ${cr.recommendedModel ? `
    <div class="pd-os-section">
      <div class="pd-os-section-head">CAPITAL ROADMAP <span class="pd-os-badge">ATERRA OS</span></div>
      <div class="pd-cap-model-name">${cr.recommendedModel}</div>
      ${phaseHtml ? `<div class="pd-cap-phases">${phaseHtml}</div>` : ''}
      ${(cr.breakeven || cr.burnProfile) ? `
      <div class="pd-cap-meta">
        ${cr.breakeven ? `<div><div class="pd-cap-meta-lbl">Break-even</div><div class="pd-cap-meta-val">${cr.breakeven}</div></div>` : ''}
        ${cr.burnProfile ? `<div><div class="pd-cap-meta-lbl">Cash Burn</div><div class="pd-cap-meta-val">${cr.burnProfile}</div></div>` : ''}
      </div>` : ''}
      ${cr.capitalKillCondition ? `<div class="pd-cap-kill">⚠ Kill condition: ${cr.capitalKillCondition}</div>` : ''}
    </div>` : ''}

    <div class="pd-next-move">
      <div class="pd-next-move-head">Recommended Next Move</div>
      <div class="pd-next-move-rec">${nm.recommendation || ''}</div>
      <div class="pd-next-move-rat">${nm.rationale || ''}</div>
      ${actionsHtml ? `<div class="pd-actions-label">Immediate Actions</div><ul class="pd-actions-list">${actionsHtml}</ul>` : ''}
    </div>

    <div style="padding:14px 18px;background:var(--tag);border-top:1px solid var(--border)">
      <div style="font-family:'DM Mono',monospace;font-size:7.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Legal Disclaimer</div>
      <div style="font-size:8.5px;color:var(--muted);line-height:1.65">${b.disclaimer || 'This brief is strategic product intelligence based on available market, consumer, competitive, and ingredient signals. It does not constitute legal, regulatory, clinical, or financial advice. Scores and verdicts reflect analyst judgment and pattern recognition, not guaranteed outcomes. Always consult qualified legal, regulatory, and financial advisors before making product, investment, or launch decisions.'}</div>
    </div>

    <div class="pd-footer">
      <div class="pd-footer-brand">Aterra Studio · Gravity System™ · ${meta.date || ''}</div>
      <div class="pd-footer-actions">
        <button class="pd-footer-btn" onclick="window.print()">Print / Save PDF</button>
        <a href="mailto:hello@aterrastudio.co?subject=Questions about my brief — ${meta.conceptName || ''}" class="pd-footer-btn">Contact Aterra</a>
      </div>
    </div>
  `;

  document.getElementById('brief-wrap').innerHTML = html;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('brief-wrap').style.display = 'block';

  // Open first dimension by default
  const firstDim = document.getElementById('dim-0');
  if (firstDim) { firstDim.classList.add('open'); }
}

function toggleSection(id) {
  document.getElementById(id)?.classList.toggle('open');
}

loadBrief();
</script>
</body>
</html>
